<header class="header">
    <div class="header-container">
        <div class="header-left">
            <div class="logo">
                <img src="../img/logo.png" alt="Logo da ctrlPLAY">
                <span class="logo-title"><span class="logo-title-tiny">CTRL</span>PLAY</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search here...">
            </div>
        </div>

        <div class="header-right">
            <div class="toggle-buttons">
                <button class="toggle-btn"><i class="fas fa-toggle-on"></i></button>
                <button class="toggle-btn"><i class="fas fa-moon"></i></button>
            </div>
            <div class="user-profile">
                <img src="https://i.pravatar.cc/40" alt="User">
                <span id="username"></span>
            </div>
        </div>
    </div>
</header>
