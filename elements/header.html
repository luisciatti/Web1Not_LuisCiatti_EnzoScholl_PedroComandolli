<header class="header" role="banner">
    <div class="header-container">

        <div class="header-left">
            <div class="logo" aria-label="Ir para a página inicial">
                <img src="./img/logo.png" alt="ctrlPLAY">
                <span class="logo-title">
                    <span class="logo-title-tiny">CTRL</span>PLAY
                </span>
            </div>
        </div>

        <div class="header-right">

            <div class="user-profile" aria-label="Informações do usuário">
                <span id="username" aria-label="Nome do usuário"></span>
                <img src="https://i.pravatar.cc/40" alt="Foto do usuário">
            </div>

            <nav aria-label="Menu do usuário">
                <ul class="header-menu">
                    <li>
                        <button id="return-log" aria-label="Sair do sistema">
                            <i class="fa-solid fa-arrow-right-from-bracket" aria-hidden="true"></i>
                        </button>
                    </li>
                </ul>
            </nav>

        </div>
    </div>
</header>
