<div id="overlay" aria-hidden="true"></div>

<div id="form-container" class="form-card" role="dialog" aria-modal="true" aria-labelledby="form-title">
  <h2 id="form-title">Cadastro</h2>

  <form id="item-form">

    <!-- Nome -->
    <div class="form-field">
      <input type="text" id="nome" name="nome" required>
      <label for="nome">Nome</label>
    </div>

    <!-- Categoria -->
    <div class="form-field">
      <input type="text" id="categoria" name="categoria" required>
      <label for="categoria">Categoria</label>
    </div>

    <!-- Preço -->
    <div class="form-field">
      <input type="number" id="preco" name="preco" required inputmode="decimal">
      <label for="preco">Preço</label>
    </div>

    <!-- Estúdio -->
    <div class="form-field">
      <input type="text" id="estudio" name="estudio" required>
      <label for="estudio">Estúdio</label>
    </div>

    <!-- Plataforma -->
    <div class="form-field">
      <input type="text" id="plataforma" name="plataforma" required>
      <label for="plataforma">Plataforma/s</label>
    </div>

    <!-- Status -->
    <div class="form-field">
      <select id="status" name="status" required>
        <option value="" disabled selected></option>
        <option value="Disponível">Disponível</option>
        <option value="Indisponível">Indisponível</option>
      </select>
      <label for="status">Status</label>
    </div>

    <!-- Botões -->
    <div class="form-actions">
        <button type="submit" class="btn btn-save">Salvar</button>
      <button type="reset" class="btn btn-clean">Limpar</button>
      <button type="button" class="btn btn-close" aria-label="Fechar formulário">Cancelar</button>
    </div>

  </form>
</div>
