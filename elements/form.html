<div id="overlay" aria-hidden="true"></div>

<div id="form-container" class="form-card" role="dialog" aria-modal="true" aria-labelledby="form-title">
  <h2 id="form-title">Cadastro</h2>

  <form id="item-form">

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="ctrlENTER" required>

    <label for="categoria">Categoria:</label>
    <input type="text" id="categoria" name="categoria" placeholder="Ação, RPG..." required>

    <label for="preco">Preço:</label>
    <input type="text" id="preco" name="preco" placeholder="R$ 199,90" required inputmode="decimal">

    <label for="estudio">Estúdio:</label>
    <input type="text" id="estudio" name="estudio" placeholder="ctrlPLAY Studios" required>

    <label for="plataforma">Plataforma/s:</label>
    <input type="text" id="plataforma" name="plataforma" placeholder="PC, PS5..." required>

    <label for="status">Status:</label>
    <select id="status" name="status" required>
      <option value="Disponível">Disponível</option>
      <option value="Indisponível">Indisponível</option>
    </select>

    <div class="form-actions">
      <button type="submit" class="btn btn-save">
        Salvar
      </button>

      <button type="reset" class="btn btn-clean">
        Limpar
      </button>

      <button type="button" class="btn btn-close" aria-label="Fechar formulário">
        Cancelar
      </button>
    </div>

  </form>
</div>
