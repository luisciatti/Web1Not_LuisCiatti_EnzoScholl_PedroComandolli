
<div id="form-container" class="form-card">
  <h2>Cadastro</h2>
  <form id="item-form">
    <label for="id">ID:</label>
    <input type="text" id="id" placeholder="#001" required>

    <label for="nome">Nome:</label>
    <input type="text" id="nome" placeholder="Nome do jogo" required>

    <label for="categoria">Categoria:</label>
    <input type="text" id="categoria" placeholder="Ação, RPG..." required>

    <label for="preco">Preço:</label>
    <input type="text" id="preco" placeholder="R$ 199,90" required>

    <label for="estudio">Estúdio:</label>
    <input type="text" id="estudio" placeholder="CTRLPLAY Studio" required>

    <label for="plataforma">Plataforma/s:</label>
    <input type="text" id="plataforma" placeholder="PC / PS5" required>

    <label for="status">Status:</label>
    <select id="status" required>
      <option value="Disponível">Disponível</option>
      <option value="Indisponível">Indisponível</option>
    </select>

    <div class="form-actions">
      <button type="submit" class="btn">Salvar</button>
      <button type="reset" class="btn">Limpar</button>
      <button type="button" class="btn btn-close">Fechar</button>
    </div>
  </form>
</div>
