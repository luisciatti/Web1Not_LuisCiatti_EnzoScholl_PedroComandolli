<!DOCTYPE html>
<html lang="pt-br">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet" href="css/geral.css">
    <link rel="stylesheet" href="css/log.css">
    <script src="js/log.js"></script>
</head>

<body>

    <div class="container login-page">

        <!-- LOGO dentro do container, acima de tudo -->
        <img src="img/logo.png" alt="Logo" class="logo">

        <!-- CONTEÚDO PRINCIPAL: esquerda + direita -->
        <div class="login-main">

            <!-- ESQUERDA -->
            <div class="login-left">

                <h1 class="title-lg mb-lg">
                    Administre seus jogos com um clique
                </h1>

            </div>

            <!-- DIREITA: bolas + card empilhados -->
            <div class="login-right">

                <!-- Bola de cima: fica atrás do card -->
                <img src="img/gradiant_ball.png" class="gradient-ball ball-1">

                <!-- Card -->
                <div class="card login-card">
                    <div class="login-content">

                        <h2 class="title-md">Login</h2>

                        <p class="text-light text-sm mb-lg">
                            Que bom que está de volta.!
                        </p>





                        <form>
                            <input id = "usuario" class="input mb-md" type="text" name="usuario" placeholder="Usuário">
                            <input id = "senha" class="input mb-md" type="password" name="senha" placeholder="Senha">
                            <div class="flex align-center gap-sm mb-md">
                                <input type="checkbox">
                                <span class="text-sm text-light">Lembre-me</span>
                            </div>
                             <input type="submit" id = "login" class="btn btn-primary w-full mb-sm">
                        </form>





                        

                        <p class="text-center text-sm text-light mb-md">
                            Esqueceu a senha?
                        </p>

                        <div class="divider">
                            <span class="text-light text-sm">Ou</span>
                        </div>

                        <div class="social-login mb-md">
                            <img src="img/icons/google.png">
                            <img src="img/icons/facebook.png">
                            <img src="img/icons/github.png">
                        </div>

                        <p class="text-center text-sm text-light mb-md">
                            Não possui uma conta?
                            <a href="#">Sign up</a>
                        </p>

                        <div class="card-footer">
                            <a href="#">Termos & Condições</a>
                            <a href="#">Suporte</a>
                            <a href="#">Sobre</a>
                        </div>

                        
                    </div>
                </div>

                <!-- Bola de baixo: fica atrás do card -->
                <img src="img/gradiant_ball_2.png" class="gradient-ball ball-2">

            </div>

        </div>

    </div>

</body>
</html>
